# bidberry.animeenigma.ru — edge TLS termination + reverse proxy to the Bun app.
# The app listens on 127.0.0.1:3000 (Bun.serve). nginx handles TLS, the
# HTTP->HTTPS redirect, the login-gated /admin/tasks board, and the emulator
# auth/proxy locations.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# --- HTTP: ACME renewals + redirect everything to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name bidberry.animeenigma.ru;

    # Keep ACME reachable so Let's Encrypt can renew (webroot authenticator).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bidberry.animeenigma.ru;

    ssl_certificate     /etc/letsencrypt/live/bidberry.animeenigma.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bidberry.animeenigma.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 50m;

    # ---- auth_request gates (proxy to the app's internal check endpoints) ----
    # 200 if the login JWT is valid (= whitelisted), 401 otherwise.
    location = /_auth/tasks {
        internal;
        proxy_pass http://127.0.0.1:3000/api/auth/check-user;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-URI $request_uri;
    }
    location = /_auth/admin {
        internal;
        proxy_pass http://127.0.0.1:3000/api/auth/check-admin;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-URI $request_uri;
    }
    location = /_auth/emu {
        internal;
        proxy_pass http://127.0.0.1:3000/api/auth/check-emu;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-URI $request_uri;
    }

    # ---- Dev task board: gated behind Telegram login (whitelisted users) ----
    location /admin/tasks {
        auth_request /_auth/tasks;
        error_page 401 =302 /;   # not logged in -> bounce to the SPA login page
        error_page 403 =302 /;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Dynamic emulator locations (auto-generated by the app) ----
    include /etc/nginx/conf.d/wb-emulators.conf;

    # ---- Everything else -> Bun app ----
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
