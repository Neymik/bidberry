version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: wb-analytics-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wb_analytics}
      MYSQL_USER: ${MYSQL_USER:-wb_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wb_password}
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wb-analytics-app
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - WB_API_KEY=${WB_API_KEY}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE:-wb_analytics}
      - MYSQL_USER=${MYSQL_USER:-wb_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-wb_password}
      - APP_PORT=3000
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT_NAME=${TELEGRAM_BOT_NAME}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_ACCESS_TTL=${JWT_ACCESS_TTL:-24h}
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    volumes:
      - ./exports:/app/exports

volumes:
  mysql_data:
