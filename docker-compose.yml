version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: wb-analytics-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wb_analytics}
      MYSQL_USER: ${MYSQL_USER:-wb_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wb_password}
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wb-analytics-app
    restart: unless-stopped
    # host network lets the container reach proxies on 127.0.0.1
    # (Telegram proxy on host). MySQL is reached via published port 127.0.0.1:3306.
    network_mode: host
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - WB_API_KEY=${WB_API_KEY}
      - MYSQL_HOST=127.0.0.1
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-wb_analytics}
      - MYSQL_USER=${MYSQL_USER:-wb_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-wb_password}
      - APP_PORT=3000
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT_NAME=${TELEGRAM_BOT_NAME}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - TELEGRAM_PROXY_URL=${TELEGRAM_PROXY_URL:-}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TTL=${JWT_ACCESS_TTL:-24h}
      - TRIGGER_SECRET=${TRIGGER_SECRET}
    volumes:
      - ./exports:/app/exports
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/nginx/conf.d:/etc/nginx-conf
      - /etc/wb-emulators:/etc/wb-emulators
      # WBPartners-Auto phone scraping DB (read-only) — authoritative order source
      - /home/ostap/WBPartners-Auto/orders.db:/mnt/wbpartners/orders.db:ro

volumes:
  mysql_data:
